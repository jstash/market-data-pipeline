apiVersion: 1

datasources:
  - name: MarketData
    type: postgres
    uid: marketdata-postgres
    url: postgres:5432
    database: ${POSTGRES_DB}
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true   # enables TimescaleDB-aware query optimizations
    isDefault: true
    editable: false
