name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [ingester, processor, storage-writer, api]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements-dev.txt

      - name: Install test dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: PYTHONPATH=. pytest tests/ -v
